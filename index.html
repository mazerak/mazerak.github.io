<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mazerak</title>
    <link rel="icon" href="favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .background-wrapper {
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="background-wrapper">
      <div class="login-card">
        <h1>hi</h1>
        <div class="mb-3">
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Password"
          />
        </div>
        <button id="login-button" class="btn btn-dark w-100">Enter</button>
        <p id="error-msg" class="error-msg">Invalid password</p>
      </div>
    </div>
    <script>
      const API_URL = "https://api.mazerak.com/get-quotes";

      const passwordInput = document.getElementById("password");
      const loginButton = document.getElementById("login-button");
      const errorMsg = document.getElementById("error-msg");

      async function login() {
        errorMsg.classList.remove("visible");
        const password = passwordInput.value;
        if (!password) return;

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          if (!res.ok) {
            errorMsg.classList.add("visible");
            return;
          }

          const data = await res.json();
          console.log("Quotes loaded", data.quotes);
          localStorage.setItem("quotes", JSON.stringify(data.quotes));
          window.location.href = "home.html";
        } catch (err) {
          console.error("Request failed: ", err);
          errorMsg.textContent = "Could not reach server";
          errorMsg.classList.add("visible");
        }
      }

      loginButton.addEventListener("click", login);
      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
